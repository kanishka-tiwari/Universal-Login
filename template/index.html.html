<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Plugin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #E0E7FF 0%, #F3E8FF 100%);
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --primary-blue: #3B82F6;
            --primary-green: #10B981;
            --lavender: #8B5CF6;
            --coral: #F43F5E;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--lavender);
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-submit {
            background: var(--primary-green);
            margin-top: 0.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #6B7280;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-btn {
            background: #FFFFFF;
            border: 1px solid var(--border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.75rem;
        }

        .social-btn.google:hover {
            border-color: var(--coral);
            background: #FFF5F5;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #4B5563;
        }

        .toggle-text a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Login</h2>
    
    <form id="auth-form" action="/auth" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-submit" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <button class="btn social-btn google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.78 2.16c1.63-1.5 2.57-3.71 2.57-6.49z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.78-2.16c-.77.52-1.76.83-2.92.83-2.25 0-4.16-1.52-4.84-3.57H1.51v2.23C3 16.07 5.76 18 9 18z" fill="#34A853"/><path d="M4.16 10.92c-.17-.52-.27-1.07-.27-1.64s.1-1.12.27-1.64V5.41H1.51C.55 7.33 0 9.48 0 11.7s.55 4.38 1.51 6.29l2.65-2.07z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.47.89 11.43 0 9 0 5.76 0 3 1.93 1.51 4.81l2.65 2.07c.68-2.05 2.59-3.57 4.84-3.57z" fill="#EA4335"/></svg>
        Google
    </button>

    <div class="toggle-text" id="toggle-container">
        Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>
    </div>
</div>

<script>
    // Initialize Supabase (Replace with your own credentials)
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isLogin = true;

    function toggleForm(e) {
        e.preventDefault();
        isLogin = !isLogin;
        
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleContainer = document.getElementById('toggle-container');
        const form = document.getElementById('auth-form');

        if (isLogin) {
            formTitle.innerText = "Login";
            submitBtn.innerText = "Sign In";
            submitBtn.style.background = "var(--primary-green)";
            toggleContainer.innerHTML = `Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>`;
            form.action = "/auth?action=login";
        } else {
            formTitle.innerText = "Sign Up";
            submitBtn.innerText = "Create Account";
            submitBtn.style.background = "var(--primary-blue)";
            toggleContainer.innerHTML = `Already have an account? <a href="#" onclick="toggleForm(event)">Login</a>`;
            form.action = "/auth?action=signup";
        }
    }

    async function loginWithGoogle() {
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/dashboard'
            }
        });
    }
</script>
</body>
</html>
