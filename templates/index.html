<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Plugin</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #E0E7FF 0%, #F3E8FF 100%);
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --primary-blue: #3B82F6;
            --primary-green: #10B981;
            --lavender: #8B5CF6;
            --coral: #F43F5E;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--lavender);
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .forgot-link-container {
            text-align: right;
            margin-top: -0.75rem;
            margin-bottom: 1.25rem;
        }

        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-submit {
            background: var(--primary-green);
            margin-top: 0.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #6B7280;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .social-btn {
            background: #FFFFFF;
            border: 1px solid var(--border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.75rem;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.75rem;
        }

        .social-btn.google:hover {
            border-color: var(--coral);
            background: #FFF5F5;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #4B5563;
        }

        .toggle-text a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #9CA3AF;
        }

        .close-btn:hover {
            color: #4B5563;
        }

        .modal h3 {
            margin-top: 0;
            color: var(--text-main);
        }

        .modal p {
            font-size: 0.9rem;
            color: #6B7280;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Login</h2>
    
    <form id="auth-form" action="/auth?action=login" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="forgot-link-container" id="forgot-container">
            <a href="#" class="forgot-link" onclick="openModal(event)">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-submit" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <a href="/login/google" class="btn social-btn google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.78 2.16c1.63-1.5 2.57-3.71 2.57-6.49z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.78-2.16c-.77.52-1.76.83-2.92.83-2.25 0-4.16-1.52-4.84-3.57H1.51v2.23C3 16.07 5.76 18 9 18z" fill="#34A853"/><path d="M4.16 10.92c-.17-.52-.27-1.07-.27-1.64s.1-1.12.27-1.64V5.41H1.51C.55 7.33 0 9.48 0 11.7s.55 4.38 1.51 6.29l2.65-2.07z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.47.89 11.43 0 9 0 5.76 0 3 1.93 1.51 4.81l2.65 2.07c.68-2.05 2.59-3.57 4.84-3.57z" fill="#EA4335"/></svg>
        Google
    </a>

    <div class="toggle-text" id="toggle-container">
        Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>
    </div>
</div>

<div id="forgot-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3>Reset Password</h3>
        <p>Enter your registered email address below, and we'll verify if your account exists.</p>
        <form id="forgot-form">
            <div class="form-group">
                <label for="forgot-email">Email Address</label>
                <input type="email" id="forgot-email" required>
            </div>
            <button type="submit" class="btn" style="background: var(--lavender);">Reset Password</button>
        </form>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleForm(e) {
        e.preventDefault();
        isLogin = !isLogin;
        
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleContainer = document.getElementById('toggle-container');
        const form = document.getElementById('auth-form');
        const forgotContainer = document.getElementById('forgot-container');

        if (isLogin) {
            formTitle.innerText = "Login";
            submitBtn.innerText = "Sign In";
            submitBtn.style.background = "var(--primary-green)";
            toggleContainer.innerHTML = `Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>`;
            form.action = "/auth?action=login";
            forgotContainer.style.display = "block"; // Show forgot password link
        } else {
            formTitle.innerText = "Sign Up";
            submitBtn.innerText = "Create Account";
            submitBtn.style.background = "var(--primary-blue)";
            toggleContainer.innerHTML = `Already have an account? <a href="#" onclick="toggleForm(event)">Login</a>`;
            form.action = "/auth?action=signup";
            forgotContainer.style.display = "none"; // Hide forgot password link
        }
    }

    // Modal Display Logic
    function openModal(e) {
        e.preventDefault();
        document.getElementById('forgot-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('forgot-modal').style.display = 'none';
        document.getElementById('forgot-form').reset();
    }

    // Close modal if user clicks outside the inner card box
    window.onclick = function(event) {
        const modal = document.getElementById('forgot-modal');
        if (event.target == modal) {
            closeModal();
        }
    }

    // Submit processing logic via asynchronous backend call
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgot-email').value;

        try {
            const response = await fetch('/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `email=${encodeURIComponent(email)}`
            });

            const result = await response.json();

            if (response.ok) {
                alert(result.message); // Successful match notification window
                closeModal();
            } else {
                alert(result.error); // Error message handling box windows alert
            }
        } catch (error) {
            alert("Something went wrong. Please try again later.");
        }
    });
</script>
</body>
</html>
